name: Test Gradle Package

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"

      - name: Test
        run: ./gradlew test
        working-directory: mvn/isicloud5gb
