name: Test pip Package

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install package
        run: pip install -e .
        working-directory: pip

      - name: Test
        run: python -m pytest tests/
        working-directory: pip
